version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: practik-db
    environment:
      POSTGRES_DB: practik_dashboard
      POSTGRES_USER: practik
      POSTGRES_PASSWORD: practik_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
